name: sync-fork (Branch main)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: { }

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: gh repo sync $REPOSITORY -b $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          REPOSITORY: https://github.com/actions/runner-images
          BRANCH_NAME: "main"
